name: Build

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

env:
  # Node 20 actions are deprecated (forced to Node 24 from 2026-06-16); opt in now.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: microsoft/setup-msbuild@v2

      - name: Build Release VSIX
        run: msbuild src\WindowLayoutManager\WindowLayoutManager.csproj /restore /t:Rebuild /p:Configuration=Release

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: WindowLayoutManager
          path: src/WindowLayoutManager/bin/Release/net472/WindowLayoutManager.vsix
          if-no-files-found: error
